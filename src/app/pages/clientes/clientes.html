<app-menu></app-menu>

<!-- 1 Criar o container da página -->
 <div class="container-fluid pt-4">
    <!-- primeira linha de conteúdo: titulo -->
    <div class="row">
        <!-- coluna inteira -->
        <div class="col-12">
            <h1 class="titulo">Cadastro de clientes</h1>
            <h2 class="subtitulo"> Gerenciar usuários: adicionar, editar ou excluir</h2>    
        </div>
    </div>

     <!-- Segunda linha de conteúdo: +Clientes e filtro -->
    <div class="row">
        <!-- coluna inteira -->
        <div class="col-12">
            <!-- botão para adicionar novos usuários -->
            <app-button txtButton="+ Cadastrar" (click)="openModalAddUser()" class="float-end"></app-button>

            <!-- Filtro para pesquisa de clientes -->
            <mat-form-field>
                <mat-label>Pesquisar cliente</mat-label>
                <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
           </mat-form-field>

        
                <!-- Tabela com paginador -->
                 <table mat-table>

                    <!-- Position Column -->
                    <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef> Id </th>
                    <td mat-cell *matCellDef="let row"> {{row.id}} </td>
                    </ng-container>

                    <!-- Name Column -->
                    <ng-container matColumnDef="nome">
                    <th mat-header-cell *matHeaderCellDef> Nome </th>
                    <td mat-cell *matCellDef="let row"> {{row.nome}} </td>
                    </ng-container>

                    <!-- Weight Column -->
                    <ng-container matColumnDef="cpf">
                    <th mat-header-cell *matHeaderCellDef> CPF </th>
                    <td mat-cell *matCellDef="let row"> {{row.cpf}} </td>
                    </ng-container>

                    <!-- Symbol Column -->
                    <ng-container matColumnDef="telefone">
                    <th mat-header-cell *matHeaderCellDef> Telefone </th>
                    <td mat-cell *matCellDef="let row"> {{row.telefone}} </td>
                    </ng-container>

                    <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef> Status </th>
                    <td mat-cell *matCellDef="let row"> {{row.status}} </td>
                    </ng-container>

                    <ng-container matColumnDef="opcoes">
                    <th mat-header-cell *matHeaderCellDef> Opções </th>
                    <td mat-cell *matCellDef="let row"> {{row.opcoes}} </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>

                <mat-paginator [pageSizeOptions]="[10, 25, 50]"
                    showFirstLastButtons
                    aria-label="Clientes por página">
                </mat-paginator>
                
        </div>
    </div>   
 </div>
